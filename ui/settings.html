<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menus Print Bridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f5; color: #212529; font-size: 14px;
  }
  .header {
    background: #1a7a4c; color: #fff;
    padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 1.1rem; font-weight: 700; }
  .header p  { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }
  /* custom lang dropdown */
  .lang-dd { position: relative; }
  .lang-btn {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.15); color: #fff;
    border: 1.5px solid rgba(255,255,255,0.4); border-radius: 8px;
    padding: 6px 10px; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  .lang-btn:hover { background: rgba(255,255,255,0.25); }
  .lang-chevron { font-size: 0.6rem; opacity: 0.8; margin-left: 2px; }
  .lang-menu {
    display: none; position: absolute; top: calc(100% + 6px); right: 0;
    background: #fff; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.18);
    overflow: hidden; z-index: 100; min-width: 140px;
  }
  .lang-menu.open { display: block; }
  .lang-opt {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px; cursor: pointer; font-size: 0.85rem;
    font-weight: 600; color: #212529;
  }
  .lang-opt:hover { background: #f0fdf4; color: #1a7a4c; }
  .lang-opt.active { color: #1a7a4c; }
  .lang-flag { width: 20px; height: 14px; border-radius: 2px; object-fit: cover; flex-shrink: 0; }
  .lang-flag-svg { width: 20px; height: 14px; border-radius: 2px; display: block; flex-shrink: 0; }
  .body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }

  .field label {
    display: block; font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .4px; color: #555; margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%; padding: 10px 12px; border: 1.5px solid #dee2e6;
    border-radius: 8px; font-size: 0.9rem; background: #fff; outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus { border-color: #1a7a4c; }
  .field .hint { font-size: 0.75rem; color: #888; margin-top: 5px; }

  .status {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
  }
  .status.ok   { background: #d1e7dd; color: #0f5132; }
  .status.err  { background: #fce8e8; color: #b91c1c; }
  .status.idle { background: #f0f0f0; color: #555; }

  .btn-row { display: flex; gap: 10px; }
  button {
    flex: 1; padding: 11px; border: none; border-radius: 8px;
    font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: opacity .15s;
  }
  button:hover { opacity: 0.88; }
  .btn-primary   { background: #1a7a4c; color: #fff; }
  .btn-secondary { background: #e9ecef; color: #212529; }

  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: #1a7a4c; }
  .dot-red   { background: #b91c1c; }
  .dot-grey  { background: #aaa; }

  /* printer type toggle */
  .type-toggle { display: flex; border: 1.5px solid #dee2e6; border-radius: 8px; overflow: hidden; }
  .type-btn {
    flex: 1; padding: 9px 10px; border: none; background: #fff;
    font-size: 0.82rem; font-weight: 600; color: #6c757d; cursor: pointer;
    transition: background .15s, color .15s; text-align: center;
  }
  .type-btn.active { background: #1a7a4c; color: #fff; }
  .type-btn:first-child { border-right: 1.5px solid #dee2e6; }

  .ip-row { display: flex; gap: 10px; }
  .ip-row .field { flex: 1; }
  .ip-row .field.port { flex: 0 0 90px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🖨️ Menus Print Bridge</h1>
    <p id="hdr-sub">Automatically print orders from all sources</p>
  </div>
  <div class="lang-dd" id="lang-dd">
    <div class="lang-btn" onclick="toggleLangMenu()">
      <span id="lang-btn-flag"></span>
      <span id="lang-btn-label">EN</span>
      <span class="lang-chevron">▼</span>
    </div>
    <div class="lang-menu" id="lang-menu"></div>
  </div>
</div>

<div class="body">

  <div id="status-bar" class="status idle">
    <span class="dot dot-grey" id="dot"></span>
    <span id="status-text">Not configured</span>
  </div>


  <div class="field">
    <label id="lbl-token">Print Token</label>
    <input type="password" id="token" placeholder="…" oninput="autoSave()">
    <div class="hint" id="lbl-token-hint">Find this in your Menus dashboard → Mobile App → Print Bridge</div>
  </div>

  <div class="field">
    <label id="lbl-printer-type">Printer type</label>
    <div class="type-toggle">
      <button class="type-btn active" id="btn-type-system" onclick="setPrinterType('system'); autoSave()">🖨 System printer</button>
      <button class="type-btn"        id="btn-type-thermal" onclick="setPrinterType('thermal'); autoSave()">🧾 Thermal (ESC/POS)</button>
    </div>
  </div>

  <div id="system-fields">
    <div class="field">
      <label id="lbl-printer">Printer</label>
      <select id="printer" onchange="autoSave()">
        <option value="" id="lbl-default-printer">System default printer</option>
      </select>
    </div>
    <div class="field" style="margin-top:14px;" id="format-field">
      <label id="lbl-format">Print format</label>
      <select id="printFormat" onchange="autoSave()">
        <option value="ps">PostScript (.ps) — best quality</option>
        <option value="txt">Plain text (.txt) — universal</option>
      </select>
    </div>
  </div>

  <div id="thermal-fields" style="display:none;">
    <div class="field">
      <button class="btn-secondary" id="btn-scan" type="button" onclick="scanNetwork()">🔍 Scan for printers</button>
      <div id="scan-results" style="display:none;margin-top:10px;"></div>
    </div>
    <div class="field" style="margin-top:14px;">
      <label id="lbl-thermal-manual">Or enter the IP manually</label>
    </div>
    <div class="ip-row">
      <div class="field">
        <label id="lbl-thermal-ip">Printer IP address</label>
        <input type="text" id="thermalIp" placeholder="192.168.1.100" oninput="autoSave()">
      </div>
      <div class="field port">
        <label id="lbl-thermal-port">Port</label>
        <input type="number" id="thermalPort" value="9100" min="1" max="65535" oninput="autoSave()">
      </div>
    </div>
    <div class="field">
      <div class="hint" id="lbl-thermal-hint">Connect your thermal printer via Ethernet or WiFi. Default port is 9100.</div>
    </div>
  </div>

  <div class="field">
    <label id="lbl-width">Paper width</label>
    <select id="cols" onchange="autoSave()">
      <option value="32">58mm thermal — narrow (32 chars)</option>
      <option value="42">80mm thermal — safe margin (42 chars)</option>
      <option value="48" selected>80mm thermal — full width (48 chars)</option>
      <option value="64">A4/Letter — system printer (64 chars)</option>
    </select>
  </div>

  <div class="field">
    <label id="lbl-trigger">Print when</label>
    <select id="trigger" onchange="autoSave()">
      <option value="arrival" id="opt-trigger-arrival">Order arrives</option>
      <option value="accept"  id="opt-trigger-accept">Order is accepted</option>
    </select>
    <div class="hint" id="lbl-trigger-hint">Scheduled orders always print about 20 minutes before they are due.</div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="btn-test" onclick="testTokenAndPrint()" style="background:#1a7a4c;">Test Token &amp; Print</button>
  </div>

  <div class="field">
    <label style="display:flex;justify-content:space-between;align-items:center;">
      <span>Log</span>
      <span onclick="clearLog()" style="font-weight:400;font-size:0.75rem;color:#888;cursor:pointer;">Clear</span>
    </label>
    <div id="log-area" style="background:#f8f9fa;border:1.5px solid #dee2e6;border-radius:8px;padding:8px 10px;font-size:0.72rem;font-family:monospace;color:#374151;height:120px;overflow-y:auto;white-space:pre-wrap;"></div>
  </div>

</div>

const LANGS = [
  { code: 'en', label: 'EN', flag: '🇬🇧' },
  { code: 'ar', label: 'AR', flag: '🇸🇦' },
  { code: 'ca', label: 'CA', flag: null },
  { code: 'de', label: 'DE', flag: '🇩🇪' },
  { code: 'es', label: 'ES', flag: '🇪🇸' },
  { code: 'fr', label: 'FR', flag: '🇫🇷' },
  { code: 'pt', label: 'PT', flag: '🇧🇷' },
  { code: 'zh', label: 'ZH', flag: '🇨🇳' },
];

const CA_FLAG_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 9 6" class="lang-flag-svg">
  <rect width="9" height="6" fill="#FCDD09"/>
  <rect y="0.6667" width="9" height="0.6667" fill="#DA121A"/>
  <rect y="2" width="9" height="0.6667" fill="#DA121A"/>
  <rect y="3.3333" width="9" height="0.6667" fill="#DA121A"/>
  <rect y="4.6667" width="9" height="0.6667" fill="#DA121A"/>
</svg>`;

function flagHTML(lang) {
  return lang.flag
    ? `<span class="lang-flag" style="font-size:1.1rem;line-height:1;">${lang.flag}</span>`
    : CA_FLAG_SVG;
}

function buildLangMenu() {
  const menu = document.getElementById('lang-menu');
  menu.innerHTML = LANGS.map(l => `
    <div class="lang-opt" data-code="${l.code}" onclick="selectLang('${l.code}')">
      ${flagHTML(l)} ${l.label}
    </div>
  `).join('');
}

function toggleLangMenu() {
  document.getElementById('lang-menu').classList.toggle('open');
}

function selectLang(code) {
  document.getElementById('lang-menu').classList.remove('open');
  applyLang(code);
  autoSave(); // persist the language right away
}

// close on outside click
document.addEventListener('click', e => {
  if (!document.getElementById('lang-dd').contains(e.target))
    document.getElementById('lang-menu').classList.remove('open');
});

let currentLang = 'en';
let currentPrinterType = 'system';
let currentStatus = { type: 'idle', key: 'notConfigured' };

function setPrinterType(type) {
  currentPrinterType = type;
  document.getElementById('btn-type-system').classList.toggle('active', type === 'system');
  document.getElementById('btn-type-thermal').classList.toggle('active', type === 'thermal');
  document.getElementById('system-fields').style.display  = type === 'system'  ? '' : 'none';
  document.getElementById('thermal-fields').style.display = type === 'thermal' ? '' : 'none';
}

function applyLang(lang) {
  currentLang = lang;
  const l = LANGS.find(x => x.code === lang) || LANGS[0];
  document.getElementById('lang-btn-flag').innerHTML = flagHTML(l);
  document.getElementById('lang-btn-label').textContent = l.label;
  document.querySelectorAll('.lang-opt').forEach(el =>
    el.classList.toggle('active', el.dataset.code === lang));
  const t = UI[lang] || UI.en;
  document.getElementById('hdr-sub').textContent             = t.sub;
  document.getElementById('lbl-token').textContent           = t.token;
  document.getElementById('lbl-token-hint').textContent      = t.tokenHint;
  document.getElementById('lbl-printer-type').textContent    = t.printerType;
  document.getElementById('btn-type-system').textContent     = '🖨 ' + t.typeSystem;
  document.getElementById('btn-type-thermal').textContent    = '🧾 ' + t.typeThermal;
  document.getElementById('lbl-thermal-ip').textContent      = t.thermalIp;
  document.getElementById('lbl-thermal-port').textContent    = t.thermalPort;
  document.getElementById('lbl-thermal-hint').textContent    = t.thermalHint;
  document.getElementById('btn-scan').textContent            = '🔍 ' + t.scanBtn;
  document.getElementById('lbl-thermal-manual').textContent  = t.thermalManual;
  document.getElementById('lbl-trigger').textContent         = t.trigger;
  document.getElementById('opt-trigger-arrival').textContent = t.triggerArrival;
  document.getElementById('opt-trigger-accept').textContent  = t.triggerAccept;
  document.getElementById('lbl-trigger-hint').textContent    = t.triggerHint;
  document.getElementById('lbl-printer').textContent         = t.printer;
  document.getElementById('lbl-default-printer').textContent = t.defaultPrinter;
  document.getElementById('lbl-width').textContent           = t.width;
  document.getElementById('lbl-format').textContent          = t.format;
  document.getElementById('btn-test').textContent            = t.testBtn;
  document.getElementById('status-text').textContent         = t[currentStatus.key] || currentStatus.text || '';
  document.getElementById('token').placeholder               = t.tokenHint.split('→')[0].trim();
}

async function init() {
  buildLangMenu();

  const [cfg, printers] = await Promise.all([
    ipcRenderer.invoke('get-config'),
    ipcRenderer.invoke('get-printers'),
  ]);

  applyLang(cfg.lang || 'en');

  if (cfg.token)       document.getElementById('token').value       = cfg.token;
  if (cfg.cols)        document.getElementById('cols').value        = cfg.cols;
  if (cfg.thermalIp)   document.getElementById('thermalIp').value   = cfg.thermalIp;
  if (cfg.thermalPort) document.getElementById('thermalPort').value = cfg.thermalPort;
  if (cfg.printFormat) document.getElementById('printFormat').value = cfg.printFormat;
  if (cfg.trigger)     document.getElementById('trigger').value     = cfg.trigger;
  if (cfg.printerType) setPrinterType(cfg.printerType);

  // Windows can only render plain text (Out-Printer) — PostScript would
  // print as source code, so force txt and hide the choice.
  if (process.platform === 'win32') {
    document.getElementById('printFormat').value = 'txt';
    document.getElementById('format-field').style.display = 'none';
  }

  const sel = document.getElementById('printer');
  printers.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    if (p === cfg.printer) opt.selected = true;
    sel.appendChild(opt);
  });

  if (cfg.token) setStatus('ok', 'running');
}

function currentCfg() {
  return {
    token:       document.getElementById('token').value.trim(),
    printer:     document.getElementById('printer').value,
    cols:        parseInt(document.getElementById('cols').value),
    lang:        currentLang,
    printerType: currentPrinterType,
    printFormat: document.getElementById('printFormat').value,
    trigger:     document.getElementById('trigger').value,
    thermalIp:   document.getElementById('thermalIp').value.trim(),
    thermalPort: parseInt(document.getElementById('thermalPort').value) || 9100,
  };
}

// Debounced so typing a token doesn't save/restart the bridge per keystroke.
// An empty token is saved too — that's how the bridge gets stopped.
let saveTimer = null;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 500);
}

async function doSave() {
  const cfg = currentCfg();
  await ipcRenderer.invoke('save-config', cfg);
  if (cfg.token) setStatus('ok', 'running');
  else setStatus('idle', 'notConfigured');
}

async function testTokenAndPrint() {
  const t = UI[currentLang] || UI.en;
  const cfg = currentCfg();
  if (!cfg.token) { setStatus('err', 'noToken'); return; }

  const btn = document.getElementById('btn-test');
  btn.disabled = true;
  btn.textContent = t.verifying;

  const verify = await ipcRenderer.invoke('verify-token', cfg);
  if (!verify.ok) {
    setStatus('err', null, 'Token invalid: ' + verify.error);
    btn.disabled = false;
    btn.textContent = t.testBtn;
    return;
  }

  const names = (verify.restaurants || []).map(r => r.name || r).join(', ');
  setStatus('ok', null, '✓ Token valid' + (names ? ' — ' + names : ''));

  btn.textContent = t.printing;
  const result = await ipcRenderer.invoke('test-print', cfg);
  btn.disabled = false;
  btn.textContent = t.testBtn;

  if (!result.ok) {
    setStatus('err', null, t.testFail + result.error);
  }
}

// Scan the LAN for thermal printers listening on the chosen port (default
// 9100). Discovered IPs render as tappable buttons; manual entry stays as the
// fallback. The port input is reused so a non-standard raw-print port still
// scans correctly.
async function scanNetwork() {
  const t = UI[currentLang] || UI.en;
  const btn = document.getElementById('btn-scan');
  const port = parseInt(document.getElementById('thermalPort').value, 10) || 9100;
  btn.disabled = true;
  btn.textContent = '🔍 ' + t.scanning;
  try {
    const r = await ipcRenderer.invoke('scan-network', port);
    const ips = (r && r.ok && Array.isArray(r.printers)) ? r.printers : [];
    renderScanResults(ips);
    appendLog(ips.length ? t.scanFound.replace(':count', ips.length) : t.scanNone);
  } catch (e) {
    renderScanResults([]);
    appendLog('Scan failed: ' + (e && e.message ? e.message : e));
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 ' + t.scanBtn;
  }
}

function renderScanResults(ips) {
  const box = document.getElementById('scan-results');
  box.innerHTML = '';
  if (!ips.length) { box.style.display = 'none'; return; }
  ips.forEach(ip => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'btn-secondary';
    b.style.cssText = 'display:block;width:100%;margin-bottom:6px;text-align:left;';
    b.textContent = '🖨 ' + ip;
    b.onclick = () => {
      document.getElementById('thermalIp').value = ip;
      box.querySelectorAll('button').forEach(x => { x.style.background = ''; x.style.color = ''; });
      b.style.background = '#1a7a4c';
      b.style.color = '#fff';
      autoSave();
    };
    box.appendChild(b);
  });
  box.style.display = '';
}

function setStatus(type, key, text) {
  const t = UI[currentLang] || UI.en;
  currentStatus = { type, key, text };
  const bar = document.getElementById('status-bar');
  const dot = document.getElementById('dot');
  bar.className = 'status ' + type;
  dot.className = 'dot ' + (type === 'ok' ? 'dot-green' : type === 'err' ? 'dot-red' : 'dot-grey');
  document.getElementById('status-text').textContent = key ? (t[key] || key) : text;
}

function appendLog(msg) {
  const el = document.getElementById('log-area');
  const ts = new Date().toLocaleTimeString();
  el.textContent += `[${ts}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log-area').textContent = '';
}

ipcRenderer.on('log', (_, msg) => appendLog(msg));

// Live status from the poll loop (auth failures, printer errors, recovery)
ipcRenderer.on('bridge-status', (_, s) => {
  if (s.type === 'ok')       setStatus('ok', 'running');
  else if (s.type === 'err') setStatus('err', null, '✗ ' + s.text);
  else                       setStatus('idle', 'notConfigured');
});

init();
ipcRenderer.invoke('get-version').then(v => { document.getElementById('version').textContent = 'v' + v; });
window.addEventListener('beforeunload', () => {
    // flush any pending debounced save — synchronously, so the in-flight
    // IPC isn't dropped when the renderer is destroyed (saves an emptied
    // token too, which is how the bridge gets stopped)
    clearTimeout(saveTimer);
    ipcRenderer.sendSync('save-config-sync', currentCfg());
});
</script>
<div id="version" style="position:fixed;bottom:8px;right:12px;font-size:0.7rem;color:#bbb;pointer-events:none;"></div>
</body>
</html>
